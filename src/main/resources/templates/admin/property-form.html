<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Property - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .header {
            background: #003580;
            padding: 16px 0;
        }

        .logo {
            color: white;
            font-size: 22px;
            font-weight: bold;
            text-decoration: none;
        }

        .btn-primary {
            background: #003580;
            border: none;
        }
    </style>
</head>

<body class="bg-light">
    <div class="header">
        <div class="container">
            <a href="/admin/dashboard" class="logo">⚙️ Admin Panel</a>
        </div>
    </div>

    <div class="container mt-4">
        <div class="bg-white rounded-3 shadow-sm p-4" style="max-width: 600px; margin: auto;">
            <h3 class="mb-4">
                <span th:if="${property.id != null}"> Edit Property</span>
                <span th:if="${property.id == null}"> Add New Property</span>
            </h3>

            <form th:action="@{/admin/properties/save}" method="post" th:object="${property}">
                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label class="form-label fw-semibold">Name *</label>
                    <input type="text" th:field="*{name}" class="form-control" required
                        placeholder="e.g. Grand Hotel Palace">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Address *</label>
                    <input type="text" th:field="*{address}" class="form-control" required
                        placeholder="e.g. 1 Main Street, Bucharest">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Description</label>
                    <textarea th:field="*{description}" class="form-control" rows="3"
                        placeholder="Brief description of the property..."></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Star Rating (1-5)</label>
                    <select th:field="*{starRating}" class="form-select">
                        <option value="1">⭐ 1 Star</option>
                        <option value="2">⭐⭐ 2 Stars</option>
                        <option value="3">⭐⭐⭐ 3 Stars</option>
                        <option value="4">⭐⭐⭐⭐ 4 Stars</option>
                        <option value="5">⭐⭐⭐⭐⭐ 5 Stars</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Image URL</label>
                    <input type="text" th:field="*{imageUrl}" class="form-control" placeholder="https://...">
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">💾 Save</button>
                    <a href="/admin/dashboard" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
