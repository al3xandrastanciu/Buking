<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reservation Confirmed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="alert alert-success" role="alert">
        <h1> Reservation Confirmed!</h1>
        <p>Your booking (ID: <span th:text="${booking.id}">1</span>) for room type <span th:text="${booking.room.roomType}"></span> at <span th:text="${booking.property.name}"></span> has been successfully placed.</p>
        <p>Check-in: <span th:text="${booking.checkIn}"></span></p>
    </div>
    <a href="/properties" class="btn btn-primary">View All Properties</a>
</div>
</body>
</html>
