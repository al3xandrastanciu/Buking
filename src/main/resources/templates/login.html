<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Login - Buking.com</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f0f4f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .login-card {
            max-width: 420px;
            width: 100%;
            margin: auto;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0, 53, 128, 0.12);
        }

        .header-bar {
            background: #003580;
            padding: 20px;
            border-radius: 12px 12px 0 0;
        }

        .logo {
            color: white;
            font-size: 28px;
            font-weight: bold;
            text-decoration: none;
        }

        .btn-primary {
            background: #003580;
            border: none;
        }

        .btn-primary:hover {
            background: #0042a0;
        }

        .form-control:focus {
            border-color: #003580;
            box-shadow: 0 0 0 0.2rem rgba(0, 53, 128, 0.2);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="login-card bg-white">
            <div class="header-bar text-center">
                <a href="/" class="logo">Buking.com</a>
                <p class="text-white mt-1 mb-0" style="opacity:0.8">Sign in to your account</p>
            </div>
            <div class="p-4">
                <div th:if="${param.error}" class="alert alert-danger">
                    Incorrect email or password. Please try again.
                </div>
                <div th:if="${param.logout}" class="alert alert-info">
                    You have been successfully logged out.
                </div>
                <div th:if="${param.registered}" class="alert alert-success">
                    Account created! You can now log in.
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <label for="username" class="form-label fw-semibold">Email</label>
                        <input type="email" id="username" name="username" class="form-control"
                            placeholder="example@email.com" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label fw-semibold">Password</label>
                        <input type="password" id="password" name="password" class="form-control" placeholder="••••••••"
                            required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                        Sign In
                    </button>
                </form>

                <hr class="my-3">
                <p class="text-center mb-0">Don't have an account?
                    <a th:href="@{/register}" class="text-decoration-none fw-semibold" style="color:#003580">Register
                        here</a>
                </p>

                <div class="mt-3 p-3 bg-light rounded small text-muted">
                    <strong>Demo accounts:</strong><br>
                    Admin: admin@buking.ro / admin123<br>
                    User: user@buking.ro / user123
                </div>
            </div>
        </div>
    </div>
</body>

</html>
