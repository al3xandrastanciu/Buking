<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
  <title>My Bookings - Buking.com</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .header {
      background: #003580;
      padding: 16px 0;
    }

    .logo {
      color: white;
      font-size: 24px;
      font-weight: bold;
      text-decoration: none;
    }

    .booking-card {
      border-left: 4px solid #003580;
      border-radius: 8px;
      margin-bottom: 16px;
    }

    .status-badge {
      background: #e8f4ed;
      color: #006b3c;
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 13px;
    }

    .user-badge {
      background: rgba(255, 255, 255, 0.15);
      color: white;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 14px;
    }
  </style>
</head>

<body class="bg-light">
  <div class="header">
    <div class="container d-flex justify-content-between align-items-center">
      <a href="/properties" class="logo">Buking.com</a>
      <div class="d-flex gap-2 align-items-center">
        <span class="user-badge">👤 <span sec:authentication="name">User</span></span>
        <form th:action="@{/logout}" method="post" class="d-inline">
          <button type="submit" class="btn btn-outline-light btn-sm">Sign Out</button>
        </form>
      </div>
    </div>
  </div>

  <div class="container mt-4">
    <h2 class="mb-4">📋 My Bookings</h2>

    <div th:if="${#lists.isEmpty(bookings)}" class="alert alert-info">
      You have no bookings yet.
      <a th:href="@{/properties}" class="alert-link">Explore hotels →</a>
    </div>

    <div th:unless="${#lists.isEmpty(bookings)}">
      <div th:each="booking : ${bookings}" class="card booking-card shadow-sm">
        <div class="card-body">
          <div class="row align-items-center">
            <div class="col-md-8">
              <h5 class="mb-1" th:text="${booking.property.name}">Hotel</h5>
              <p class="text-muted small mb-1"> <span th:text="${booking.property.address}">Address</span></p>
              <p class="mb-1">🛏️ Room: <strong th:text="${booking.room.roomType}">Type</strong>
                (No. <span th:text="${booking.room.roomNumber}"></span>)</p>
              <p class="mb-0">
                📅 Check-in: <span th:text="${booking.checkIn}">2026-01-01</span>
                &nbsp;→&nbsp; Check-out: <span th:text="${booking.checkOut}">2026-01-05</span>
              </p>
            </div>
            <div class="col-md-4 text-end">
              <div class="display-6 fw-bold text-primary" style="font-size:1.6rem" th:text="${booking.price + ' lei'}">0
                lei</div>
              <span class="status-badge">✓ Confirmed</span>
              <div class="mt-2">
                <a th:href="@{/properties/{id}(id=${booking.property.id})}" class="btn btn-outline-primary btn-sm">Leave
                  a Review</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <a th:href="@{/properties}" class="btn btn-primary mt-3">← Back to Properties</a>
  </div>
</body>

</html>
