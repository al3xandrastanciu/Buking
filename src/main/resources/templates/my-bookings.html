<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>My Bookings</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="header">
  <div class="container">
    <a href="/" class="logo">Buking.com</a>
  </div>
</div>

<div class="container mt-4">
  <h1>My Bookings</h1>
  <p class="text-muted">Currently viewing reservations for User ID 1 (Simulated).</p>

  <div th:if="${bookings.isEmpty()}" class="alert alert-warning">
    You currently have no active bookings.
  </div>

  <div th:unless="${bookings.isEmpty()}">
    <div th:each="booking : ${bookings}" class="card mb-3">
      <div class="card-body">
        <h5 class="card-title" th:text="${booking.property.name}">Hotel Name</h5>
        <p class="card-text">
          <strong>Booking ID:</strong> <span th:text="${booking.id}">1</span> |
          <strong>Room Type:</strong> <span th:text="${booking.room.roomType}">STANDARD</span>
        </p>
        <p class="card-text">
          <strong>Check-in:</strong> <span th:text="${booking.checkIn}">2026-05-01</span> |
          <strong>Check-out:</strong> <span th:text="${booking.checkOut}">2026-05-05</span>
        </p>
        <p class="card-text"><strong>Price Paid:</strong> <span th:text="${'€' + booking.price}">€199.99</span></p>
      </div>
    </div>
  </div>

  <a href="/properties" class="btn btn-secondary mt-3">Back to Listings</a>
</div>
</body>
</html>
