<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>Properties - Buking.com</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .header {
            background-color: #003580;
            padding: 16px 0;
        }

        .logo {
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-decoration: none;
        }

        .card-img-top {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card {
            height: 100%;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
        }

        .star-badge {
            color: #febb02;
        }

        .btn-primary {
            background: #003580;
            border: none;
        }

        .btn-primary:hover {
            background: #0042a0;
        }

        .user-badge {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border-radius: 20px;
            padding: 4px 14px;
            font-size: 14px;
        }
    </style>
</head>

<body class="bg-light">
    <div class="header">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center">
                <a href="/properties" class="logo">Buking.com</a>
                <div class="d-flex align-items-center gap-3">
                    <span class="user-badge">👤 <span sec:authentication="name">User</span></span>
                    <a th:href="@{/my-bookings}" class="btn btn-light btn-sm">📋 My Bookings</a>
                    <a th:href="@{/admin/dashboard}" sec:authorize="hasAuthority('ROLE_ADMIN')"
                        class="btn btn-warning btn-sm">⚙️ Admin</a>
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-outline-light btn-sm">Sign Out</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="container mt-5">
        <h2 class="mb-4">🏨 Available Properties</h2>
        <form method="GET" th:action="@{/properties}" class="row mb-4">
            <div class="col-md-6">
                <input type="text" name="query" class="form-control" placeholder="Search by name or location..."
                    th:value="${query}">
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary w-100">🔍 Search</button>
            </div>
        </form>

        <div class="row">
            <div class="col-md-4 mb-4" th:each="property : ${properties}">
                <div class="card">
                    <img th:src="${property.imageUrl}" class="card-img-top" alt="Hotel">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title" th:text="${property.name}">Hotel name</h5>
                        <p class="card-text text-muted small" th:text="${property.address}">Address</p>
                        <div class="star-badge mb-2">
                            <span th:each="i : ${#numbers.sequence(1, property.starRating)}">⭐</span>
                        </div>
                        <div th:if="${property.averageRating != null}" class="mb-2 small text-muted">
                            Rating: <strong
                                th:text="${#numbers.formatDecimal(property.averageRating, 1, 1)}">0.0</strong>/5
                            (<span th:text="${property.reviewCount}">0</span> reviews)
                        </div>
                        <a th:href="@{/properties/{id}(id=${property.id})}" class="btn btn-primary mt-auto">View Details
                            →</a>
                    </div>
                </div>
            </div>
            <div th:if="${#lists.isEmpty(properties)}" class="col-12">
                <div class="alert alert-info">No properties found for your search.</div>
            </div>
        </div>
    </div>
</body>

</html>
