<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Register - Buking.com</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f0f4f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .register-card {
            max-width: 440px;
            width: 100%;
            margin: auto;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0, 53, 128, 0.12);
        }

        .header-bar {
            background: #003580;
            padding: 20px;
            border-radius: 12px 12px 0 0;
        }

        .logo {
            color: white;
            font-size: 28px;
            font-weight: bold;
            text-decoration: none;
        }

        .btn-primary {
            background: #003580;
            border: none;
        }

        .btn-primary:hover {
            background: #0042a0;
        }

        .form-control:focus {
            border-color: #003580;
            box-shadow: 0 0 0 0.2rem rgba(0, 53, 128, 0.2);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="register-card bg-white">
            <div class="header-bar text-center">
                <a href="/" class="logo">Buking.com</a>
                <p class="text-white mt-1 mb-0" style="opacity:0.8">Create a new account</p>
            </div>
            <div class="p-4">
                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <form th:action="@{/register}" method="post" th:object="${registerRequest}">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Full Name</label>
                        <input type="text" th:field="*{name}" class="form-control" placeholder="e.g. John Smith"
                            required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email</label>
                        <input type="email" th:field="*{email}" class="form-control" placeholder="example@email.com"
                            required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Password</label>
                        <input type="password" th:field="*{password}" class="form-control"
                            placeholder="Minimum 6 characters" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                        Create Account
                    </button>
                </form>

                <hr class="my-3">
                <p class="text-center mb-0">Already have an account?
                    <a th:href="@{/login}" class="text-decoration-none fw-semibold" style="color:#003580">Sign in</a>
                </p>
            </div>
        </div>
    </div>
</body>

</html>
